name: Publish Python 🐍 distribution 📦 to PyPI and TestPyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  # 🐧 Linux 构建任务
  build-linux:
    name: Build on Linux ${{ matrix.arch }} (Ubuntu 20.04 Container) 🏗️
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    container:
      image: ubuntu:20.04
      env:
        DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install system dependencies
        run: |
          apt-get update
          apt-get install -y curl git unzip build-essential libffi-dev

      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python 🐍
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Bun ⚡
        uses: oven-sh/setup-bun@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-linux-${{ matrix.arch }}-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            bun-linux-${{ matrix.arch }}-

      - name: Set up Just
        uses: extractions/setup-just@v3

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Build UI
        run: just build-ui

      - name: Build a binary wheel and a source tarball
        if: matrix.arch == 'x86_64'
        run: uv build

      - name: Build executable with PyInstaller 🧊
        run: uv run pyinstaller --clean dingent.spec --distpath dist_bin

      # ✅ 新增：处理 Linux 产物（重命名文件夹并打包）
      - name: Compress OneFolder package 📦
        run: |
          cd dist_bin
          # 1. 找到以 _dir 结尾的目录名 (例如 dingent-linux-x86_64_dir)
          DIR_NAME=$(ls -d *_dir)
          # 2. 提取基础名称 (例如 dingent-linux-x86_64)
          BASE_NAME=$(basename "$DIR_NAME" _dir)

          # 3. 将文件夹重命名为简洁的 'dingent'，这样用户解压后看到的是干净的文件夹名
          #    注意：这里不会和同级目录下的单文件 dingent-linux-x86_64 冲突
          mv "$DIR_NAME" dingent

          # 4. 打包成 tar.gz
          tar -czvf "${BASE_NAME}.tar.gz" dingent

          # 5. 删除未压缩的原始目录，这样 upload-artifact 就只上传 exe 和 tar.gz
          rm -rf dingent

          # 打印一下结果，方便调试
          echo "Build artifacts ready:"
          ls -lh

      - name: Store the executable artifact 📦
        uses: actions/upload-artifact@v4
        with:
          name: dingent-artifacts-linux-${{ matrix.arch }}
          path: dist_bin/

      - name: Store the distribution packages
        if: matrix.arch == 'x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

  # 🪟 Windows 构建任务
  build-windows:
    name: Build on Windows 🏗️
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python 🐍
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up Bun ⚡
        uses: oven-sh/setup-bun@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-windows-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            bun-windows-

      - name: Set up Just
        uses: extractions/setup-just@v3

      - name: Install the project
        run: uv sync --locked --all-extras --dev

      - name: Build UI
        run: just build-ui
        shell: powershell

      - name: Build executable with PyInstaller 🧊
        run: uv run pyinstaller --clean dingent.spec --distpath dist_bin

      # ✅ 新增：处理 Windows 产物（重命名文件夹并打包）
      - name: Compress OneFolder package 📦
        shell: powershell
        run: |
          cd dist_bin
          # 1. 获取 _dir 结尾的目录对象
          $dir = Get-ChildItem -Directory -Filter "*_dir"
          # 2. 计算基础名称 (去掉 _dir)
          $baseName = $dir.Name -replace "_dir",""

          # 3. 将文件夹重命名为 'dingent'
          Rename-Item -Path $dir.Name -NewName "dingent"

          # 4. 压缩为 Zip，添加 -folder 后缀
          Compress-Archive -Path "dingent" -DestinationPath "${baseName}-folder.zip"

          # 5. 删除原始文件夹
          Remove-Item -Path "dingent" -Recurse -Force

          Write-Host "Build artifacts ready:"
          Get-ChildItem

      - name: Store the executable artifact 📦
        uses: actions/upload-artifact@v4
        with:
          name: dingent-artifacts-windows
          path: dist_bin/

  publish-to-github-release:
    name: Upload Assets to GitHub Release 🐙
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all executable artifacts
        uses: actions/download-artifact@v4
        with:
          # 修改 pattern 以匹配上面步骤定义的新名称
          pattern: dingent-artifacts-*
          path: release_assets
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R release_assets

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*

  publish-to-pypi:
    name: Publish Python 🐍 distribution 📦 to PyPI
    if: github.event_name == 'release' && !github.event.release.prerelease
    needs: [build-linux]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/Dingent
    permissions:
      id-token: write

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-to-testpypi:
    name: Publish Python 🐍 distribution 📦 to TestPyPI
    needs: [build-linux]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/Dingent
    permissions:
      id-token: write

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish distribution 📦 to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
